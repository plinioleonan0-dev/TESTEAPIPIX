<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento Aprovado!</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    .container {
        background: #1c1c1c;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,255,0,0.1);
        max-width: 400px;
        width: 90%;
    }
    .check-icon {
        font-size: 60px;
        color: #0aa34f;
        margin-bottom: 20px;
    }
    h1 {
        color: #0aa34f;
        margin-top: 0;
    }
    p {
        color: #ccc;
        line-height: 1.5;
    }
    .utm-box {
        margin-top: 30px;
        background: #000;
        padding: 15px;
        border-radius: 6px;
        border: 1px dashed #444;
        font-family: monospace;
        font-size: 14px;
        color: #888;
        word-wrap: break-word;
    }
    .utm-box span {
        color: #e50914;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <div class="check-icon">✓</div>
    <h1>Pagamento Aprovado!</h1>
    <p>Obrigado pela sua compra. Seu PIX foi confirmado com sucesso.</p>
    
    <div class="utm-box" id="utmBox">
        Aguardando dados de rastreio...
    </div>
</div>

<script>
    // Esse script simples pega as UTMs da URL e mostra na tela para provar que o repasse funcionou!
    window.onload = function() {
        const parametros = window.location.search;
        const box = document.getElementById('utmBox');
        
        if (parametros) {
            box.innerHTML = "<span>Parâmetros Recebidos:</span><br><br>" + parametros;
        } else {
            box.innerHTML = "Nenhuma UTM foi passada na URL.";
        }
    };
</script>

</body>
</html>
